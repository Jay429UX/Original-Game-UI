<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dicey — Limbo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0b0a;
    --surface: #111311;
    --surface-raised: #161816;
    --border: #1e201e;
    --border-focus: #00ab4c;
    --green-primary: #00ab4c;
    --green-glow: transparent;
    --green-dark: #007a36;
    --green-gradient-start: #0a1a0f;
    --green-gradient-end: #00ab4c;
    --text-primary: #e8eee8;
    --text-secondary: #6b756b;
    --text-muted: #3d433d;
    --radius: 8px;
    --radius-sm: 8px;
    --radius-xs: 8px;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* ── Shell ── */
  .app-shell {
    width: 100%;
    max-width: 420px;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    background: #0e100f;
    border: 1px solid rgba(255, 255, 255, 0.05);
    padding-bottom: 70px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    position: relative;
    z-index: 10;
  }

  .header-brand {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header-brand svg {
    width: 22px;
    height: 22px;
    fill: var(--text-primary);
  }

  .header-brand span {
    font-weight: 700;
    font-size: 18px;
    letter-spacing: -0.02em;
  }

  .header-brand small {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--text-secondary);
    display: block;
    margin-top: -2px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .balance-pill {
    background: var(--surface-raised);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 14px 6px 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
  }

  .balance-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green-primary);
  }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: var(--surface-raised);
    border: 1.5px solid var(--border);
    display: grid;
    place-items: center;
    font-size: 16px;
  }

  /* ── Main content ── */
  .main-content {
    display: flex;
    flex-direction: column;
    padding: 0 16px 16px;
    gap: 0;
  }

  /* ── Game Viewport ── */
  .game-viewport {
    border-radius: var(--radius) var(--radius) 0 0;
    overflow: hidden;
    position: relative;
    background: linear-gradient(165deg, var(--green-gradient-start) 0%, #0f2d14 30%, var(--green-gradient-end) 100%);
    border: 1px solid var(--border);
    border-bottom: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 24px 20px 20px;
    height: calc(100dvh - 50px - 70px - 48px - 110px - 32px);
    min-height: 200px;
  }

  .game-viewport .game-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
  }

  .game-bottom {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 340px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: rgba(0, 0, 0, 0.55);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: var(--radius);
    padding: 16px;
    backdrop-filter: blur(12px);
  }

  .game-viewport::before {
    content: '';
    position: absolute;
    inset: 0;
    background: none;
    pointer-events: none;
  }

  .game-viewport::after {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='40' height='40' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='1' cy='1' r='0.6' fill='rgba(255,255,255,0.03)'/%3E%3C/svg%3E");
    pointer-events: none;
  }

  /* ── Limbo Result Display ── */
  .limbo-result-display {
    position: relative;
    z-index: 1;
    font-family: 'JetBrains Mono', monospace;
    font-size: 56px;
    font-weight: 700;
    color: rgba(255,255,255,0.9);
    text-align: center;
    transition: color 0.3s ease;
    min-height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .limbo-result-display.win { color: #00e65a; }
  .limbo-result-display.loss { color: #f87171; }
  .limbo-result-display.animating { color: rgba(255,255,255,0.9); }

  .limbo-target-label {
    position: relative;
    z-index: 1;
    font-size: 11px;
    font-weight: 500;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.06em;
  }

  /* ── Probability/Multiplier Control ── */
  .limbo-control-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .limbo-control-label {
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
  }

  .limbo-swap-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    color: rgba(255,255,255,0.5);
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: var(--radius-xs);
    transition: color 0.15s ease, background 0.15s ease;
  }

  .limbo-swap-btn:hover {
    color: rgba(255,255,255,0.8);
    background: rgba(255,255,255,0.04);
  }

  .limbo-swap-btn svg {
    width: 14px;
    height: 14px;
  }

  .limbo-control-input-row {
    display: flex;
    align-items: center;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: var(--radius-xs);
    padding: 10px 14px;
    gap: 4px;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }

  .limbo-control-input-row:focus-within {
    border-color: var(--green-primary);
    box-shadow: 0 0 0 3px rgba(0, 171, 76, 0.15);
  }

  .limbo-control-input {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 600;
    color: #fff;
    caret-color: var(--green-primary);
    -moz-appearance: textfield;
  }

  .limbo-control-input::-webkit-outer-spin-button,
  .limbo-control-input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  .limbo-control-suffix {
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: rgba(255,255,255,0.4);
  }

  /* ── Slider ── */
  .slider-container {
    position: relative;
    z-index: 1;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .slider-track-wrapper {
    position: relative;
    height: 36px;
    display: flex;
    align-items: center;
  }

  .slider-track {
    position: absolute;
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    overflow: visible;
  }

  .slider-fill {
    position: absolute;
    height: 100%;
    background: var(--green-primary);
    border-radius: 3px;
    transition: width 0.05s ease;
  }

  .slider-range {
    -webkit-appearance: none;
    appearance: none;
    position: absolute;
    width: 100%;
    height: 36px;
    background: transparent;
    pointer-events: none;
    margin: 0;
    outline: none;
  }

  .slider-range::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 28px;
    border-radius: 6px;
    background: #fff;
    border: 2px solid var(--green-primary);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    cursor: pointer;
    pointer-events: all;
    position: relative;
    z-index: 2;
  }

  .slider-range::-moz-range-thumb {
    width: 12px;
    height: 28px;
    border-radius: 6px;
    background: #fff;
    border: 2px solid var(--green-primary);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    cursor: pointer;
    pointer-events: all;
  }

  .slider-labels {
    display: flex;
    justify-content: space-between;
    font-family: 'Outfit', sans-serif;
    font-size: 9px;
    color: rgba(255,255,255,0.3);
    margin-top: -4px;
  }

  /* ── Bet Controls Wrapper ── */
  .bet-controls {
    background: #161816;
    border-radius: 0 0 var(--radius) var(--radius);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-top: none;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    flex-shrink: 0;
  }

  /* ── Bet Mode Toggle ── */
  .bet-mode-toggle {
    display: flex;
    background: var(--surface);
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    overflow: hidden;
    padding: 4px;
    gap: 4px;
  }

  .bet-mode-btn {
    flex: 1;
    padding: 9px 10px;
    border: none;
    border-radius: var(--radius-xs);
    background: transparent;
    color: var(--text-muted);
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .bet-mode-btn.active {
    background: var(--surface-raised);
    color: var(--text-primary);
  }

  /* ── Manual Bet Settings ── */
  .manual-settings {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .stat-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-xs);
  }

  .stat-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 0.02em;
  }

  .stat-value-wrap {
    display: flex;
    align-items: center;
    gap: 2px;
  }

  .stat-input {
    width: 90px;
    padding: 0;
    border: none;
    outline: none;
    background: transparent;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
    text-align: right;
    caret-color: var(--green-primary);
    -moz-appearance: textfield;
  }

  .stat-input::-webkit-outer-spin-button,
  .stat-input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  .stat-suffix {
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--text-secondary);
  }

  /* ── Auto Bet Settings ── */
  .autobet-settings {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .autobet-field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .autobet-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 0.04em;
  }

  .autobet-input-row {
    display: flex;
    align-items: stretch;
    gap: 0;
    border-radius: var(--radius-xs);
    border: 1px solid var(--border);
    background: var(--surface);
    overflow: hidden;
  }

  .autobet-input {
    flex: 1;
    min-width: 0;
    padding: 14px 14px;
    border: none;
    outline: none;
    background: transparent;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 500;
    color: var(--text-primary);
    caret-color: var(--green-primary);
  }

  .autobet-input::placeholder {
    color: var(--text-muted);
  }

  .autobet-chips {
    display: flex;
    align-items: center;
    border-left: 1px solid var(--border);
  }

  .autobet-chip {
    padding: 10px 12px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: color 0.15s ease, background 0.15s ease;
    border-left: 1px solid var(--border);
  }

  .autobet-chip:first-child {
    border-left: none;
  }

  .autobet-chip:hover {
    color: var(--green-primary);
    background: rgba(0, 171, 76, 0.06);
  }

  .autobet-toggle-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .autobet-seg {
    display: flex;
    background: var(--surface);
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    overflow: hidden;
    padding: 4px;
    gap: 4px;
  }

  .autobet-seg-btn {
    flex: 1;
    padding: 9px 8px;
    border: none;
    border-radius: var(--radius-xs);
    background: transparent;
    color: var(--text-muted);
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .autobet-seg-btn.active {
    background: var(--surface-raised);
    color: var(--text-primary);
  }

  .autobet-pct {
    display: flex;
    align-items: center;
    border-radius: var(--radius-xs);
    border: 1px solid var(--border);
    background: var(--surface);
    overflow: hidden;
  }

  .autobet-pct-input {
    flex: 1;
    min-width: 0;
    padding: 8px 12px;
    border: none;
    outline: none;
    background: transparent;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    caret-color: var(--green-primary);
  }

  .autobet-pct-sign {
    padding: 8px 12px;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    border-left: 1px solid var(--border);
    background: var(--surface-raised);
  }

  .autobet-stop-row {
    display: flex;
    align-items: stretch;
    border-radius: var(--radius-xs);
    border: 1px solid var(--border);
    background: var(--surface);
    overflow: hidden;
  }

  .autobet-stop-row .currency-tag {
    padding: 0 10px;
    font-size: 13px;
  }

  .autobet-stop-input {
    border: none !important;
    border-radius: 0 !important;
  }

  /* ── Bet Button ── */
  .bet-button {
    width: 100%;
    height: 48px;
    padding: 0 16px;
    border: none;
    border-radius: var(--radius);
    background: var(--green-primary);
    color: #fff;
    font-family: 'Outfit', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.01em;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.15);
  }

  .bet-button:active {
    transform: scale(0.97);
    box-shadow: none;
  }

  .bet-button::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, transparent 50%);
    pointer-events: none;
  }

  .bet-button::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }

  .bet-button:hover::after {
    opacity: 1;
  }

  .bet-button .btn-content {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .bet-button .btn-content svg {
    width: 18px;
    height: 18px;
  }

  /* ── Bet Input Group ── */
  .input-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .input-label {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .input-label span {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    letter-spacing: 0.04em;
  }

  .input-label .potential-win {
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    color: var(--green-primary);
    text-transform: none;
    letter-spacing: 0;
  }

  .input-row {
    display: flex;
    align-items: stretch;
    gap: 0;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface);
    overflow: hidden;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }

  .input-row:focus-within {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(0, 171, 76, 0.15);
  }

  .currency-tag {
    display: flex;
    align-items: center;
    padding: 0 12px;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    background: var(--surface-raised);
    border-right: 1px solid var(--border);
    user-select: none;
  }

  .bet-input {
    flex: 1;
    min-width: 0;
    padding: 18px 12px;
    border: none;
    outline: none;
    background: transparent;
    font-family: 'Outfit', sans-serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--text-primary);
    caret-color: var(--green-primary);
  }

  .bet-input::placeholder {
    color: var(--text-muted);
  }

  .quick-amounts {
    display: flex;
    align-items: center;
    border-left: 1px solid var(--border);
  }

  .quick-btn {
    min-width: 48px;
    padding: 18px 0;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: color 0.15s ease, background 0.15s ease;
    border-left: 1px solid var(--border);
    text-align: center;
  }

  .quick-btn:first-child {
    border-left: none;
  }

  .quick-btn:hover {
    color: var(--green-primary);
    background: rgba(0, 171, 76, 0.06);
  }

  .quick-btn:active {
    background: rgba(0, 171, 76, 0.1);
  }

  /* ── Settings Bar ── */
  .settings-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 2px 0;
    border-top: 1px solid var(--border);
    position: relative;
  }

  /* ── Desktop Settings Strip (hidden on mobile) ── */
  .desktop-settings-strip { display: none; }

  .settings-popup {
    display: none;
    position: absolute;
    bottom: 52px;
    left: 0;
    width: 220px;
    background: var(--surface-raised);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    flex-direction: column;
    gap: 12px;
    z-index: 30;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
  }
  .settings-popup.visible { display: flex; }

  .settings-popup-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.01em;
  }

  .settings-popup-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .settings-popup-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
  }

  .settings-toggle {
    position: relative;
    width: 40px;
    height: 22px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 11px;
    cursor: pointer;
    transition: background 0.2s ease;
    border: none;
    padding: 0;
  }
  .settings-toggle.active { background: var(--green-primary); }
  .settings-toggle::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #fff;
    transition: transform 0.2s ease;
  }
  .settings-toggle.active::after { transform: translateX(18px); }

  .settings-left {
    display: flex;
    align-items: center;
    gap: 2px;
  }

  .settings-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 6px;
    border-radius: var(--radius-xs);
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--text-secondary);
    transition: color 0.15s ease, background 0.15s ease;
  }

  .settings-btn svg {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }

  .settings-btn:hover {
    color: var(--text-primary);
    background: rgba(255,255,255,0.04);
  }

<script>
  // ── State ──
  const betInput = document.getElementById('betAmount');
  const potentialWin = document.getElementById('potentialWin');
  const multInput = document.getElementById('multInput');
  const winProbInput = document.getElementById('winProbInput');
  const limboResult = document.getElementById('limboResult');
  const targetLabelEl = document.getElementById('targetLabel');
  const controlInput = document.getElementById('controlInput');
  const controlLabel = document.getElementById('controlLabel');
  const controlSuffix = document.getElementById('controlSuffix');
  const swapBtn = document.getElementById('swapBtn');
  const swapText = document.getElementById('swapText');
  const swapValue = document.getElementById('swapValue');
  const limboSlider = document.getElementById('limboSlider');
  const sliderFill = document.getElementById('sliderFill');
  const resultTrack = document.getElementById('resultTrack');
  const betBtn = document.getElementById('betBtn');

  let balance = 100;
  let targetMultiplier = 2.00;
  let controlMode = 'probability'; // 'probability' or 'multiplier'
  let turboMode = false;
  let soundEnabled = false;
  let isAnimating = false;

  // Autobet state
  let autobetRunning = false;
  let autobetTimer = null;
  let autobetCount = 0;
  let autobetMaxBets = 10;
  let autobetBaseBet = 0;
  let autobetProfit = 0;

  // ── Math ──
  const SLIDER_MIN = 0;
  const SLIDER_MAX = 10000;
  const MULT_MIN = 1.01;
  const MULT_MAX = 1000000;

  function probabilityFromMultiplier(mult) {
    return 99 / mult;
  }

  function multiplierFromProbability(prob) {
    return 99 / prob;
  }

  function generateResult() {
    const rand = Math.random() || Number.MIN_VALUE;
    const result = 0.99 / rand;
    return Math.min(result, MULT_MAX);
  }

  // ── Logarithmic Slider Mapping ──
  const LOG_MIN = Math.log(MULT_MIN);
  const LOG_MAX = Math.log(MULT_MAX);

  function sliderToMultiplier(sliderVal) {
    const t = sliderVal / SLIDER_MAX;
    return Math.exp(LOG_MIN + t * (LOG_MAX - LOG_MIN));
  }

  function multiplierToSlider(mult) {
    const t = (Math.log(mult) - LOG_MIN) / (LOG_MAX - LOG_MIN);
    return Math.round(Math.max(0, Math.min(SLIDER_MAX, t * SLIDER_MAX)));
  }

  // ── Format large multipliers ──
  function formatMultiplier(val) {
    if (val >= 10000) return (val / 1000).toFixed(1) + 'Kx';
    if (val >= 100) return val.toFixed(1) + 'x';
    return val.toFixed(2) + 'x';
  }

  // ── Master Sync ──
  function syncAllFromMultiplier() {
    targetMultiplier = Math.max(MULT_MIN, Math.min(MULT_MAX, targetMultiplier));
    const prob = probabilityFromMultiplier(targetMultiplier);

    // Slider
    limboSlider.value = multiplierToSlider(targetMultiplier);
    const fillPct = (parseInt(limboSlider.value) / SLIDER_MAX) * 100;
    sliderFill.style.left = '0%';
    sliderFill.style.width = fillPct + '%';

    // Manual settings
    multInput.value = targetMultiplier.toFixed(2);
    winProbInput.value = prob.toFixed(4);

    // Viewport control
    if (controlMode === 'probability') {
      controlInput.value = prob.toFixed(4);
      swapValue.textContent = targetMultiplier.toFixed(2);
      swapText.innerHTML = 'Multiplier: <span id="swapValue">' + targetMultiplier.toFixed(2) + '</span>x';
    } else {
      controlInput.value = targetMultiplier.toFixed(2);
      swapValue.textContent = prob.toFixed(4);
      swapText.innerHTML = 'Probability: <span id="swapValue">' + prob.toFixed(4) + '</span>%';
    }

    // Target label
    targetLabelEl.textContent = 'Target: ' + targetMultiplier.toFixed(2) + 'x';

    updateWin();
  }

  function updateWin() {
    const val = parseFloat(betInput.value) || 0;
    const win = (val * targetMultiplier).toFixed(2);
    potentialWin.textContent = `Win: $${win} (${targetMultiplier.toFixed(2)}x)`;
  }

  function updateBalanceDisplay() {
    document.querySelector('.balance-pill').innerHTML =
      '<div class="balance-dot"></div>$' + balance.toFixed(2);
  }

  // ── Slider Events ──
  limboSlider.addEventListener('input', () => {
    targetMultiplier = sliderToMultiplier(parseInt(limboSlider.value));
    syncAllFromMultiplier();
  });

  // ── Viewport Control Input ──
  controlInput.addEventListener('change', () => {
    let val = parseFloat(controlInput.value);
    if (controlMode === 'probability') {
      if (!val || val < 0.000099) val = 0.000099;
      if (val > 98.02) val = 98.02;
      targetMultiplier = multiplierFromProbability(val);
    } else {
      if (!val || val < MULT_MIN) val = MULT_MIN;
      if (val > MULT_MAX) val = MULT_MAX;
      targetMultiplier = val;
    }
    syncAllFromMultiplier();
  });

  // ── Swap Button ──
  swapBtn.addEventListener('click', () => {
    if (controlMode === 'probability') {
      controlMode = 'multiplier';
      controlLabel.textContent = 'Multiplier';
      controlSuffix.textContent = 'x';
    } else {
      controlMode = 'probability';
      controlLabel.textContent = 'Probability';
      controlSuffix.textContent = '%';
    }
    syncAllFromMultiplier();
  });

  // ── Manual Settings: Reverse Sync ──
  multInput.addEventListener('change', () => {
    let val = parseFloat(multInput.value);
    if (val && val >= MULT_MIN) {
      targetMultiplier = Math.min(val, MULT_MAX);
      syncAllFromMultiplier();
    }
  });

  winProbInput.addEventListener('change', () => {
    let wp = parseFloat(winProbInput.value);
    if (wp && wp >= 0.01 && wp <= 98.02) {
      targetMultiplier = multiplierFromProbability(wp);
      syncAllFromMultiplier();
    }
  });

  betInput.addEventListener('input', () => updateWin());

  // ── Quick Amount Buttons ──
  let maxConfirmPending = false;
  const maxBtn = document.querySelector('.quick-btn[data-action="max"]');

  document.querySelectorAll('.quick-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const action = btn.dataset.action;
      let val = parseFloat(betInput.value) || 0;

      if (action === 'max') {
        if (!maxConfirmPending) {
          maxConfirmPending = true;
          maxBtn.textContent = 'Confirm';
          maxBtn.style.color = 'var(--green-primary)';
          maxBtn.style.padding = '18px 14px';
          setTimeout(() => {
            if (maxConfirmPending) {
              maxConfirmPending = false;
              maxBtn.textContent = 'Max';
              maxBtn.style.color = '';
              maxBtn.style.padding = '';
            }
          }, 3000);
          return;
        }
        maxConfirmPending = false;
        maxBtn.textContent = 'Max';
        maxBtn.style.color = '';
        maxBtn.style.padding = '';
        val = balance;
      } else {
        if (maxConfirmPending) {
          maxConfirmPending = false;
          maxBtn.textContent = 'Max';
          maxBtn.style.color = '';
          maxBtn.style.padding = '';
        }
        if (action === 'half') val = val / 2;
        if (action === 'double') val = val * 2;
      }

      betInput.value = Math.max(0, Math.min(val, balance)).toFixed(2);
      updateWin();
    });
  });

  // ── Animation ──
  function animateResult(finalValue, isWin, callback) {
    const duration = turboMode ? 150 : 1000;
    const startTime = performance.now();

    limboResult.classList.remove('win', 'loss');
    limboResult.classList.add('animating');

    function animate(currentTime) {
      const elapsed = currentTime - startTime;
      const progress = Math.min(elapsed / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);

      const currentValue = 1.00 + (finalValue - 1.00) * eased;
      limboResult.textContent = formatMultiplier(currentValue);

      if (progress < 1) {
        requestAnimationFrame(animate);
      } else {
        limboResult.textContent = formatMultiplier(finalValue);
        limboResult.classList.remove('animating');
        limboResult.classList.add(isWin ? 'win' : 'loss');
        callback();
      }
    }

    requestAnimationFrame(animate);
  }

  // ── Result Pills ──
  function addResultPill(isWin, resultMultiplier) {
    const pill = document.createElement('div');
    pill.className = `result-pill ${isWin ? 'win' : 'loss'}`;
    pill.textContent = isWin
      ? '+' + targetMultiplier.toFixed(2) + 'x'
      : formatMultiplier(resultMultiplier);
    resultTrack.appendChild(pill);
    resultTrack.scrollLeft = resultTrack.scrollWidth;
  }

  // ── Play Limbo ──
  function playLimbo() {
    if (isAnimating) return;

    const betAmt = parseFloat(betInput.value) || 0;
    if (betAmt <= 0) return;
    if (betAmt > balance) return;

    isAnimating = true;
    betBtn.style.opacity = '0.7';
    betBtn.style.pointerEvents = 'none';

    // Deduct bet
    balance -= betAmt;
    updateBalanceDisplay();

    // Generate result
    const result = generateResult();
    const isWin = result >= targetMultiplier;

    // Button press effect
    betBtn.style.transform = 'scale(0.95)';
    setTimeout(() => betBtn.style.transform = '', 150);

    // Animate
    animateResult(result, isWin, () => {
      if (isWin) {
        const winAmt = betAmt * targetMultiplier;
        balance += winAmt;
      }
      updateBalanceDisplay();
      addResultPill(isWin, result);

      isAnimating = false;
      betBtn.style.opacity = '';
      betBtn.style.pointerEvents = '';

      if (autobetRunning) {
        processAutobetResult(isWin, betAmt);
      }
    });
  }

  // ── Bet Button ──
  betBtn.addEventListener('click', () => {
    const isAutoMode = document.querySelector('.bet-mode-btn[data-mode="auto"]').classList.contains('active');
    if (isAutoMode) {
      if (autobetRunning) {
        stopAutobet();
      } else {
        startAutobet();
      }
    } else {
      playLimbo();
    }
  });

  // ── Bet Mode Toggle ──
  const autobetPanel = document.getElementById('autobetSettings');
  const manualPanel = document.getElementById('manualSettings');
  document.querySelectorAll('.bet-mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.bet-mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const isAuto = btn.dataset.mode === 'auto';
      autobetPanel.style.display = isAuto ? '' : 'none';
      manualPanel.style.display = isAuto ? 'none' : '';
      betBtn.querySelector('.btn-content').textContent = isAuto ? 'Start Autobet' : 'Bet Now';
      if (!isAuto && autobetRunning) stopAutobet();
    });
  });

  // ── Autobet ──
  function startAutobet() {
    const betAmt = parseFloat(betInput.value) || 0;
    if (betAmt <= 0 || betAmt > balance) return;

    autobetMaxBets = parseInt(document.getElementById('numBets').value) || Infinity;
    if (document.getElementById('numBets').value === '') autobetMaxBets = Infinity;
    autobetBaseBet = betAmt;
    autobetCount = 0;
    autobetProfit = 0;
    autobetRunning = true;

    betBtn.querySelector('.btn-content').textContent = 'Stop Autobet';
    playLimbo();
  }

  function stopAutobet() {
    autobetRunning = false;
    clearTimeout(autobetTimer);
    const isAutoMode = document.querySelector('.bet-mode-btn[data-mode="auto"]').classList.contains('active');
    betBtn.querySelector('.btn-content').textContent = isAutoMode ? 'Start Autobet' : 'Bet Now';
  }

  function processAutobetResult(isWin, betAmt) {
    autobetCount++;
    const payout = isWin ? betAmt * targetMultiplier : 0;
    autobetProfit += (payout - betAmt);

    // Check stop conditions
    if (autobetCount >= autobetMaxBets) { stopAutobet(); return; }

    const stopProfitInputs = document.querySelectorAll('.autobet-stop-input');
    const stopProfit = parseFloat(stopProfitInputs[0]?.value) || 0;
    const stopLoss = parseFloat(stopProfitInputs[1]?.value) || 0;

    if (stopProfit > 0 && autobetProfit >= stopProfit) { stopAutobet(); return; }
    if (stopLoss > 0 && autobetProfit <= -stopLoss) { stopAutobet(); return; }

    // Get on win/loss settings
    const onWinBtn = document.querySelector('[data-target="onWin"].active');
    const onLossBtn = document.querySelector('[data-target="onLoss"].active');
    const onWinAction = onWinBtn ? onWinBtn.dataset.action : 'reset';
    const onLossAction = onLossBtn ? onLossBtn.dataset.action : 'reset';
    const onWinPct = parseFloat(document.querySelector('#onWinPct .autobet-pct-input')?.value) || 50;
    const onLossPct = parseFloat(document.querySelector('#onLossPct .autobet-pct-input')?.value) || 100;

    // Adjust bet
    let nextBet = parseFloat(betInput.value);
    if (isWin) {
      nextBet = onWinAction === 'reset' ? autobetBaseBet : nextBet * (1 + onWinPct / 100);
    } else {
      nextBet = onLossAction === 'reset' ? autobetBaseBet : nextBet * (1 + onLossPct / 100);
    }

    nextBet = Math.min(nextBet, balance);
    if (nextBet <= 0 || balance <= 0) { stopAutobet(); return; }

    betInput.value = nextBet.toFixed(2);
    updateWin();

    const delay = turboMode ? 200 : 1000;
    autobetTimer = setTimeout(() => {
      if (autobetRunning) playLimbo();
    }, delay);
  }

  // ── Autobet Number Chips ──
  document.querySelectorAll('.autobet-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const v = chip.dataset.bets;
      document.getElementById('numBets').value = v === 'Infinity' ? '' : v;
      if (v === 'Infinity') document.getElementById('numBets').placeholder = '∞';
    });
  });

  // ── On Win / On Loss Segmented Toggles ──
  document.querySelectorAll('.autobet-seg-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const seg = btn.closest('.autobet-seg');
      seg.querySelectorAll('.autobet-seg-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const target = btn.dataset.target;
      const pctEl = document.getElementById(target + 'Pct');
      pctEl.style.display = btn.dataset.action === 'increase' ? '' : 'none';
    });
  });

  // ── Settings Popup ──
  const settingsPopup = document.getElementById('settingsPopup');
  const soundToggle = document.getElementById('soundToggle');
  const turboSettingsToggle = document.getElementById('turboSettingsToggle');
  const settingsBtnEl = document.getElementById('settingsBtn');

  settingsBtnEl.addEventListener('click', (e) => {
    e.stopPropagation();
    settingsPopup.classList.toggle('visible');
    settingsBtnEl.classList.toggle('active', settingsPopup.classList.contains('visible'));
  });

  document.addEventListener('click', (e) => {
    if (!settingsPopup.contains(e.target) && e.target !== settingsBtnEl) {
      settingsPopup.classList.remove('visible');
      settingsBtnEl.classList.remove('active');
    }
  });

  soundToggle.addEventListener('click', () => {
    soundEnabled = !soundEnabled;
    soundToggle.classList.toggle('active', soundEnabled);
  });

  turboSettingsToggle.addEventListener('click', () => {
    turboMode = !turboMode;
    turboSettingsToggle.classList.toggle('active', turboMode);
  });

  // ── Init ──
  syncAllFromMultiplier();
</script>

</body>
</html>
