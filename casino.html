<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dicey — Casino</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0b0a;
    --surface: #111311;
    --surface-raised: #161816;
    --border: #1e201e;
    --border-focus: #00ab4c;
    --green-primary: #00ab4c;
    --green-dark: #007a36;
    --text-primary: #e8eee8;
    --text-secondary: #6b756b;
    --text-muted: #3d433d;
    --radius: 8px;
    --radius-sm: 8px;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  .app-shell {
    width: 100%;
    max-width: 420px;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    background: #0e100f;
    border: 1px solid rgba(255, 255, 255, 0.05);
    padding-bottom: 70px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    position: relative;
    z-index: 10;
  }

  .header-brand {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header-brand span {
    font-weight: 700;
    font-size: 18px;
    letter-spacing: -0.02em;
  }

  .header-brand small {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--text-secondary);
    display: block;
    margin-top: -2px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .balance-pill {
    background: var(--surface-raised);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 14px 6px 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
  }

  .balance-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green-primary);
  }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: var(--surface-raised);
    border: 1.5px solid var(--border);
    display: grid;
    place-items: center;
    font-size: 16px;
  }

  /* ── Page Content ── */
  .page-content {
    flex: 1;
    padding: 8px 16px 16px;
  }

  .section-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-secondary);
    letter-spacing: 0.04em;
    margin-bottom: 12px;
  }

  /* ── Game Grid ── */
  .game-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }

  .game-card {
    display: flex;
    flex-direction: column;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.15s ease, transform 0.15s ease;
  }

  .game-card:active {
    transform: scale(0.97);
  }

  .game-card:hover {
    border-color: rgba(255, 255, 255, 0.1);
  }

  .game-card-thumb {
    aspect-ratio: 4 / 3;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--surface) 0%, var(--surface-raised) 100%);
    position: relative;
    overflow: hidden;
  }

  .game-card-thumb .game-icon {
    font-size: 40px;
    opacity: 0.9;
  }

  .game-card-thumb.dice-thumb {
    background: linear-gradient(160deg, #0a1a0f 0%, #0e2a16 50%, #0a1a0f 100%);
  }

  .game-card-thumb.dice-thumb::after,
  .game-card-thumb.limbo-thumb::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 60%, rgba(0, 171, 76, 0.15) 0%, transparent 70%);
  }

  .game-card-thumb.limbo-thumb {
    background: linear-gradient(160deg, #0a1a0f 0%, #0e2a16 50%, #0a1a0f 100%);
  }

  .game-card-info {
    padding: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .game-card-name {
    font-size: 14px;
    font-weight: 600;
  }

  .game-card-tag {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 3px 8px;
    border-radius: 100px;
    background: rgba(0, 171, 76, 0.12);
    color: var(--green-primary);
  }

  .game-card.coming-soon {
    opacity: 0.4;
    pointer-events: none;
  }

  .game-card.coming-soon .game-card-tag {
    background: rgba(255, 255, 255, 0.06);
    color: var(--text-muted);
  }

  /* ── Bottom Nav ── */
  .bottom-nav {
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 10px 16px 20px;
    border-top: 1px solid var(--border);
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 420px;
    background: #0e100f;
    z-index: 20;
  }

  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 6px 20px;
    border-radius: var(--radius-sm);
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    font-family: 'Outfit', sans-serif;
    font-size: 11px;
    font-weight: 600;
    transition: color 0.15s ease;
    text-decoration: none;
  }

  .nav-item svg {
    width: 20px;
    height: 20px;
  }

  .nav-item.active {
    color: var(--green-primary);
    background: rgba(0, 171, 76, 0.06);
  }

  .nav-item:hover:not(.active) {
    color: var(--text-secondary);
  }

  /* ══ Desktop Layout ══ */
  @media (min-width: 768px) {
    .app-shell { max-width: 1200px; }
    .header { padding: 14px 24px; }
    .page-content { padding: 8px 24px 24px; }
    .game-grid { grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .bottom-nav { max-width: 1200px; }
  }

  @media (min-width: 1024px) {
    .game-grid { grid-template-columns: repeat(4, 1fr); }
  }
</style>
</head>
<body>

<div class="app-shell">

  <!-- Header -->
  <header class="header">
    <div class="header-brand">
      <img src="assets/Diceylogo.svg" alt="Dicey" height="20">
    </div>
    <div class="header-right">
      <div class="balance-pill">
        <div class="balance-dot"></div>
        $0.02
      </div>
      <div class="avatar">🎲</div>
    </div>
  </header>

  <!-- Page Content -->
  <div class="page-content">
    <div class="section-title">Games</div>
    <div class="game-grid">

      <!-- Dice -->
      <a href="index.html" class="game-card">
        <div class="game-card-thumb dice-thumb">
          <span class="game-icon">🎲</span>
        </div>
        <div class="game-card-info">
          <span class="game-card-name">Dice</span>
          <span class="game-card-tag">Live</span>
        </div>
      </a>

      <!-- Blackjack -->
      <a href="blackjack.html" class="game-card">
        <div class="game-card-thumb">
          <span class="game-icon">🃏</span>
        </div>
        <div class="game-card-info">
          <span class="game-card-name">Blackjack</span>
          <span class="game-card-tag">Live</span>
        </div>
      </a>

      <div class="game-card coming-soon">
        <div class="game-card-thumb">
          <span class="game-icon">🎰</span>
        </div>
        <div class="game-card-info">
          <span class="game-card-name">Slots</span>
          <span class="game-card-tag">Soon</span>
        </div>
      </div>

      <a href="coinflip.html" class="game-card">
        <div class="game-card-thumb">
          <span class="game-icon">🪙</span>
        </div>
        <div class="game-card-info">
          <span class="game-card-name">Coinflip</span>
          <span class="game-card-tag">Live</span>
        </div>
      </a>

      <a href="plinko.html" class="game-card">
        <div class="game-card-thumb">
          <span class="game-icon">📌</span>
        </div>
        <div class="game-card-info">
          <span class="game-card-name">Plinko</span>
          <span class="game-card-tag">Live</span>
        </div>
      </a>

      <a href="keno.html" class="game-card">
        <div class="game-card-thumb">
          <span class="game-icon">🎱</span>
        </div>
        <div class="game-card-info">
          <span class="game-card-name">Keno</span>
          <span class="game-card-tag">Live</span>
        </div>
      </a>

      <a href="limbo.html" class="game-card">
        <div class="game-card-thumb limbo-thumb">
          <span class="game-icon">📈</span>
        </div>
        <div class="game-card-info">
          <span class="game-card-name">Limbo</span>
          <span class="game-card-tag">Live</span>
        </div>
      </a>

    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="#" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      Explore
    </a>
    <a href="casino.html" class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C6.48 2 2 6 2 10c0 5.25 10 12 10 12s10-6.75 10-12c0-4-4.48-8-10-8z"/></svg>
      Casino
    </a>
    <a href="#" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 9l6 6 6-6"/><path d="M12 3v12"/><rect x="3" y="17" width="18" height="4" rx="1"/></svg>
      Sports
    </a>
  </nav>

</div>

</body>
</html>
