<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dicey — Dice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0b0a;
    --surface: #111311;
    --surface-raised: #161816;
    --border: #1e201e;
    --border-focus: #00ab4c;
    --green-primary: #00ab4c;
    --green-glow: transparent;
    --green-dark: #007a36;
    --green-gradient-start: #0a1a0f;
    --green-gradient-end: #00ab4c;
    --text-primary: #e8eee8;
    --text-secondary: #6b756b;
    --text-muted: #3d433d;
    --radius: 8px;
    --radius-sm: 8px;
    --radius-xs: 8px;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* ── Shell ── */
  .app-shell {
    width: 100%;
    max-width: 420px;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    background: #0e100f;
    border: 1px solid rgba(255, 255, 255, 0.05);
    padding-bottom: 70px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    position: relative;
    z-index: 10;
  }

  .header-brand {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header-brand svg {
    width: 22px;
    height: 22px;
    fill: var(--text-primary);
  }

  .header-brand span {
    font-weight: 700;
    font-size: 18px;
    letter-spacing: -0.02em;
  }

  .header-brand small {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-secondary);
    display: block;
    margin-top: -2px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .balance-pill {
    background: var(--surface-raised);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 14px 6px 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
  }

  .balance-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green-primary);
    /* no glow */
  }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: var(--surface-raised);
    border: 1.5px solid var(--border);
    display: grid;
    place-items: center;
    font-size: 16px;
  }

  /* ── Main content: fills viewport ── */
  .main-content {
    display: flex;
    flex-direction: column;
    padding: 0 16px 16px;
    gap: 0;
  }

  /* ── Game Viewport ── */
  .game-viewport {
    border-radius: var(--radius) var(--radius) 0 0;
    overflow: hidden;
    position: relative;
    background: linear-gradient(165deg, var(--green-gradient-start) 0%, #0f2d14 30%, var(--green-gradient-end) 100%);
    border: 1px solid var(--border);
    border-bottom: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 24px 20px 20px;
    min-height: 340px;
  }

  .game-viewport .game-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
  }

  .game-bottom {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 340px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: rgba(0, 0, 0, 0.35);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: var(--radius);
    padding: 16px;
    backdrop-filter: blur(12px);
  }

  .game-viewport::before {
    content: '';
    position: absolute;
    inset: 0;
    background: none;
    pointer-events: none;
  }

  .game-viewport::after {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='40' height='40' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='1' cy='1' r='0.6' fill='rgba(255,255,255,0.03)'/%3E%3C/svg%3E");
    pointer-events: none;
  }

  .viewport-dice {
    position: relative;
    z-index: 1;
    width: 64px;
    height: 64px;
    background: rgba(255,255,255,0.08);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    display: grid;
    place-items: center;
    font-size: 32px;
    backdrop-filter: blur(8px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-6px) rotate(3deg); }
  }

  .viewport-label {
    position: relative;
    z-index: 1;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: rgba(255,255,255,0.9);
    /* no text-shadow */
  }

  .viewport-sublabel {
    position: relative;
    z-index: 1;
    font-size: 11px;
    font-weight: 500;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* ── Bet Controls Wrapper ── */
  .bet-controls {
    background: #161816;
    border-radius: 0 0 var(--radius) var(--radius);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-top: none;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* ── Bet Mode Toggle ── */
  .bet-mode-toggle {
    display: flex;
    background: var(--surface);
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    overflow: hidden;
    padding: 4px;
    gap: 4px;
  }

  .bet-mode-btn {
    flex: 1;
    padding: 9px 10px;
    border: none;
    border-radius: var(--radius-xs);
    background: transparent;
    color: var(--text-muted);
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .bet-mode-btn.active {
    background: var(--surface-raised);
    color: var(--text-primary);
  }

  /* ── Manual Bet Settings ── */
  .manual-settings {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .stat-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-xs);
  }

  .stat-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 0.02em;
  }

  .stat-value-wrap {
    display: flex;
    align-items: center;
    gap: 2px;
  }

  .stat-input {
    width: 90px;
    padding: 0;
    border: none;
    outline: none;
    background: transparent;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
    text-align: right;
    caret-color: var(--green-primary);
    -moz-appearance: textfield;
  }

  .stat-input::-webkit-outer-spin-button,
  .stat-input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  .stat-suffix {
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--text-secondary);
  }

  /* ── Auto Bet Settings ── */
  .autobet-settings {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .autobet-field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .autobet-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .autobet-input-row {
    display: flex;
    align-items: stretch;
    gap: 0;
    border-radius: var(--radius-xs);
    border: 1px solid var(--border);
    background: var(--surface);
    overflow: hidden;
  }

  .autobet-input {
    flex: 1;
    min-width: 0;
    padding: 14px 14px;
    border: none;
    outline: none;
    background: transparent;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 500;
    color: var(--text-primary);
    caret-color: var(--green-primary);
  }

  .autobet-input::placeholder {
    color: var(--text-muted);
  }

  .autobet-chips {
    display: flex;
    align-items: center;
    border-left: 1px solid var(--border);
  }

  .autobet-chip {
    padding: 10px 12px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: color 0.15s ease, background 0.15s ease;
    border-left: 1px solid var(--border);
  }

  .autobet-chip:first-child {
    border-left: none;
  }

  .autobet-chip:hover {
    color: var(--green-primary);
    background: rgba(0, 171, 76, 0.06);
  }

  .autobet-toggle-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .autobet-seg {
    display: flex;
    background: var(--surface);
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    overflow: hidden;
    padding: 4px;
    gap: 4px;
  }

  .autobet-seg-btn {
    flex: 1;
    padding: 9px 8px;
    border: none;
    border-radius: var(--radius-xs);
    background: transparent;
    color: var(--text-muted);
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .autobet-seg-btn.active {
    background: var(--surface-raised);
    color: var(--text-primary);
  }

  .autobet-pct {
    display: flex;
    align-items: center;
    border-radius: var(--radius-xs);
    border: 1px solid var(--border);
    background: var(--surface);
    overflow: hidden;
  }

  .autobet-pct-input {
    flex: 1;
    min-width: 0;
    padding: 8px 12px;
    border: none;
    outline: none;
    background: transparent;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    caret-color: var(--green-primary);
  }

  .autobet-pct-sign {
    padding: 8px 12px;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    border-left: 1px solid var(--border);
    background: var(--surface-raised);
  }

  .autobet-stop-row {
    display: flex;
    align-items: stretch;
    border-radius: var(--radius-xs);
    border: 1px solid var(--border);
    background: var(--surface);
    overflow: hidden;
  }

  .autobet-stop-row .currency-tag {
    padding: 0 10px;
    font-size: 13px;
  }

  .autobet-stop-input {
    border: none !important;
    border-radius: 0 !important;
  }

  /* ── Bet Button ── */
  .bet-button {
    width: 100%;
    height: 48px;
    padding: 0 16px;
    border: none;
    border-radius: var(--radius);
    background: var(--green-primary);
    color: #fff;
    font-family: 'Outfit', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.01em;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.15);
  }

  .bet-button:active {
    transform: scale(0.97);
    box-shadow: none;
  }

  .bet-button::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, transparent 50%);
    pointer-events: none;
  }

  .bet-button::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }

  .bet-button:hover::after {
    opacity: 1;
  }

  .bet-button .btn-content {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .bet-button .btn-content svg {
    width: 18px;
    height: 18px;
  }

  /* ── Bet Input Group ── */
  .input-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .input-label {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .input-label span {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .input-label .potential-win {
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    color: var(--green-primary);
    text-transform: none;
    letter-spacing: 0;
  }

  .input-row {
    display: flex;
    align-items: stretch;
    gap: 0;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface);
    overflow: hidden;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }

  .input-row:focus-within {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(0, 171, 76, 0.15);
  }

  .currency-tag {
    display: flex;
    align-items: center;
    padding: 0 12px;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    background: var(--surface-raised);
    border-right: 1px solid var(--border);
    user-select: none;
  }

  .bet-input {
    flex: 1;
    min-width: 0;
    padding: 18px 12px;
    border: none;
    outline: none;
    background: transparent;
    font-family: 'Outfit', sans-serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--text-primary);
    caret-color: var(--green-primary);
  }

  .bet-input::placeholder {
    color: var(--text-muted);
  }

  .quick-amounts {
    display: flex;
    align-items: center;
    border-left: 1px solid var(--border);
  }

  .quick-btn {
    min-width: 48px;
    padding: 18px 0;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: color 0.15s ease, background 0.15s ease;
    border-left: 1px solid var(--border);
    text-align: center;
  }

  .quick-btn:first-child {
    border-left: none;
  }

  .quick-btn:hover {
    color: var(--green-primary);
    background: rgba(0, 171, 76, 0.06);
  }

  .quick-btn:active {
    background: rgba(0, 171, 76, 0.1);
  }

  /* ── Game Options (inside viewport) ── */
  .game-options {
    position: relative;
    z-index: 1;
    display: flex;
    gap: 5px;
    width: 100%;
    max-width: 340px;
  }

  .option-chip {
    flex: 1;
    padding: 7px 4px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: var(--radius-xs);
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.5);
    font-family: 'Outfit', sans-serif;
    font-size: 10px;
    font-weight: 600;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s ease;
    backdrop-filter: blur(4px);
    white-space: nowrap;
  }

  .option-chip:hover {
    border-color: rgba(255,255,255,0.3);
    color: rgba(255,255,255,0.8);
  }

  .option-chip.active {
    border-color: var(--green-primary);
    background: rgba(0, 171, 76, 0.12);
    color: #fff;
    box-shadow: 0 0 0 1px var(--green-primary);
  }

  /* ── Slider ── */
  .slider-container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 340px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .slider-value-display {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .slider-value {
    font-family: 'Outfit', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    /* no text-shadow */
    min-width: 50px;
    text-align: center;
  }

  .slider-separator {
    font-size: 14px;
    color: rgba(255,255,255,0.3);
    font-weight: 500;
  }

  .slider-track-wrapper {
    position: relative;
    height: 36px;
    display: flex;
    align-items: center;
  }

  .slider-track {
    position: absolute;
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    overflow: visible;
  }

  .slider-fill {
    position: absolute;
    height: 100%;
    background: var(--green-primary);
    border-radius: 3px;
    /* no glow */
    transition: left 0.05s ease, width 0.05s ease;
  }

  .slider-range {
    -webkit-appearance: none;
    appearance: none;
    position: absolute;
    width: 100%;
    height: 36px;
    background: transparent;
    pointer-events: none;
    margin: 0;
    outline: none;
  }

  .slider-range::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #fff;
    border: 3px solid var(--green-primary);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    cursor: pointer;
    pointer-events: all;
    position: relative;
    z-index: 2;
  }

  .slider-range::-moz-range-thumb {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #fff;
    border: 3px solid var(--green-primary);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    cursor: pointer;
    pointer-events: all;
  }

  .slider-labels {
    display: flex;
    justify-content: space-between;
    font-family: 'Outfit', sans-serif;
    font-size: 9px;
    color: rgba(255,255,255,0.3);
    margin-top: -4px;
  }

  .slider-range-b {
    z-index: 3;
  }

  /* ── Settings Bar (inline) ── */
  .settings-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 2px 0;
    border-top: 1px solid var(--border);
  }

  .settings-left {
    display: flex;
    align-items: center;
    gap: 2px;
  }

  .settings-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 6px;
    border-radius: var(--radius-xs);
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--text-secondary);
    transition: color 0.15s ease, background 0.15s ease;
  }

  .settings-btn svg {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }

  .settings-btn:hover {
    color: var(--text-primary);
    background: rgba(255,255,255,0.04);
  }

  .settings-btn:active {
    background: rgba(255,255,255,0.06);
  }

  .settings-btn.active {
    color: var(--green-primary);
  }

  .settings-label {
    font-family: 'Outfit', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.01em;
    white-space: nowrap;
  }

  .settings-divider {
    width: 1px;
    height: 18px;
    background: var(--border);
    flex-shrink: 0;
  }

  /* ── Bottom Nav ── */
  .bottom-nav {
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 10px 16px 20px;
    border-top: 1px solid var(--border);
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 420px;
    background: #0e100f;
    z-index: 20;
  }

  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 6px 20px;
    border-radius: var(--radius-sm);
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    font-family: 'Outfit', sans-serif;
    font-size: 11px;
    text-decoration: none;
    font-weight: 600;
    transition: color 0.15s ease;
  }

  .nav-item svg {
    width: 20px;
    height: 20px;
  }

  .nav-item.active {
    color: var(--green-primary);
    background: rgba(0, 171, 76, 0.06);
  }

  .nav-item:hover:not(.active) {
    color: var(--text-secondary);
  }

  /* ── Result Pill ── */
  .rakeback-row {
    position: absolute;
    top: 10px;
    left: 0;
    right: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 6px;
    pointer-events: none;
  }

  .rakeback-pill {
    flex-shrink: 0;
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(0, 0, 0, 0.45);
    border: 1px solid rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(8px);
    padding: 6px 12px;
    border-radius: 100px;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    pointer-events: auto;
  }
  .rakeback-pill img {
    border-radius: 4px;
  }

  .result-pill-track {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
    min-height: 0;
    flex: 1;
    min-width: 0;
    mask-image: linear-gradient(to right, transparent, black 40px);
    -webkit-mask-image: linear-gradient(to right, transparent, black 40px);
  }
  .result-pill-track::-webkit-scrollbar { display: none; }

  .result-pill {
    display: inline-flex;
    align-items: center;
    padding: 4px 12px;
    border-radius: 100px;
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
    animation: pillSlideIn 0.3s ease forwards;
  }

  .result-pill.win {
    background: rgba(0, 171, 76, 0.2);
    border: 1px solid rgba(0, 171, 76, 0.4);
    color: #00e65a;
  }

  .result-pill.loss {
    background: rgba(220, 38, 38, 0.2);
    border: 1px solid rgba(220, 38, 38, 0.4);
    color: #f87171;
  }

  @keyframes pillSlideIn {
    from { transform: translateX(40px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  /* ── Responsive ── */
  @media (max-width: 380px) {
    .viewport-label { font-size: 18px; }
    .bet-input { font-size: 16px; }
  }
</style>
</head>
<body>

<div class="app-shell">

  <!-- Header -->
  <header class="header">
    <div class="header-brand">
      <div>
        <span>dicey</span>
        <small>by Magic Eden</small>
      </div>
    </div>
    <div class="header-right">
      <div class="balance-pill">
        <div class="balance-dot"></div>
        $0.02
      </div>
      <div class="avatar">🎲</div>
    </div>
  </header>

  <!-- Main content -->
  <div class="main-content">
    <div class="game-viewport">
      <div class="rakeback-row">
        <div class="result-pill-track" id="resultTrack"></div>
        <div class="rakeback-pill">
          <img src="assets/Rakeboost.svg" alt="Rakeback" width="18" height="18">
          <span id="rakebackVal">$0.00</span>
        </div>
      </div>
      <div class="game-content">
        <div class="viewport-dice" style="width:48px;height:48px;font-size:24px;border-radius:10px;">🎲</div>
        <div class="viewport-sublabel" id="modeLabel">Roll over to win</div>
        <div class="slider-value-display">
          <span class="slider-value" id="sliderValA">50</span>
          <span class="slider-separator" id="sliderSep" style="display:none">—</span>
          <span class="slider-value" id="sliderValB" style="display:none">75</span>
        </div>
      </div>

      <!-- Slider + Options pinned to bottom -->
      <div class="game-bottom">
        <div class="slider-container">
          <div class="slider-track-wrapper">
            <div class="slider-track">
              <div class="slider-fill" id="sliderFill"></div>
            </div>
            <input type="range" class="slider-range" id="sliderA" min="1" max="100" value="50">
            <input type="range" class="slider-range slider-range-b" id="sliderB" min="1" max="100" value="75" style="display:none">
          </div>
          <div class="slider-labels">
            <span>1</span>
            <span>25</span>
            <span>50</span>
            <span>75</span>
            <span>100</span>
          </div>
        </div>
        <div class="game-options">
          <button class="option-chip active" data-type="rollover">Over</button>
          <button class="option-chip" data-type="rollunder">Under</button>
          <button class="option-chip" data-type="between">Between</button>
          <button class="option-chip" data-type="outside">Outside</button>
        </div>
      </div>
    </div>

    <!-- Bet Controls Wrapper -->
    <div class="bet-controls">
      <!-- Bet Button -->
      <button class="bet-button" id="betBtn">
        <div class="btn-content">
          Bet Now
        </div>
      </button>

      <!-- Bet Amount Input -->
      <div class="input-group">
        <div class="input-label">
          <span>Bet Amount</span>
          <span class="potential-win" id="potentialWin">Win: $0.00 (1.41x)</span>
        </div>
        <div class="input-row">
          <div class="currency-tag">$</div>
          <input
            class="bet-input"
            type="number"
            inputmode="decimal"
            placeholder="0.00"
            id="betAmount"
            step="0.01"
            min="0"
          >
          <div class="quick-amounts">
            <button class="quick-btn" data-action="half">½</button>
            <button class="quick-btn" data-action="double">2×</button>
            <button class="quick-btn" data-action="max">Max</button>
          </div>
        </div>
      </div>

      <!-- Bet Mode Toggle -->
      <div class="bet-mode-toggle">
        <button class="bet-mode-btn active" data-mode="manual">Manual Bet</button>
        <button class="bet-mode-btn" data-mode="auto">Auto Bet</button>
      </div>

      <!-- Manual Bet Settings (visible by default) -->
      <div class="manual-settings" id="manualSettings">
        <div class="stat-row">
          <span class="stat-label">Multiplier</span>
          <div class="stat-value-wrap">
            <input class="stat-input" type="number" id="multInput" step="0.0001" min="1.01">
            <span class="stat-suffix">x</span>
          </div>
        </div>
        <div class="stat-row">
          <span class="stat-label">Win Probability</span>
          <div class="stat-value-wrap">
            <input class="stat-input" type="number" id="winProbInput" step="0.1" min="0.01" max="99">
            <span class="stat-suffix">%</span>
          </div>
        </div>
      </div>

      <!-- Auto Bet Settings (hidden by default) -->
      <div class="autobet-settings" id="autobetSettings" style="display:none">

        <!-- Number of Bets -->
        <div class="autobet-field">
          <span class="autobet-label">Number of Bets</span>
          <div class="autobet-input-row">
            <input class="autobet-input" type="number" id="numBets" value="10" min="1" placeholder="10">
            <div class="autobet-chips">
              <button class="autobet-chip" data-bets="10">10</button>
              <button class="autobet-chip" data-bets="100">100</button>
              <button class="autobet-chip" data-bets="Infinity">∞</button>
            </div>
          </div>
        </div>

        <!-- On Win -->
        <div class="autobet-field">
          <span class="autobet-label">On Win</span>
          <div class="autobet-toggle-row">
            <div class="autobet-seg">
              <button class="autobet-seg-btn active" data-action="reset" data-target="onWin">Reset</button>
              <button class="autobet-seg-btn" data-action="increase" data-target="onWin">Increase by</button>
            </div>
            <div class="autobet-pct" id="onWinPct" style="display:none">
              <input class="autobet-pct-input" type="number" value="50" min="1" max="500">
              <span class="autobet-pct-sign">%</span>
            </div>
          </div>
        </div>

        <!-- On Loss -->
        <div class="autobet-field">
          <span class="autobet-label">On Loss</span>
          <div class="autobet-toggle-row">
            <div class="autobet-seg">
              <button class="autobet-seg-btn active" data-action="reset" data-target="onLoss">Reset</button>
              <button class="autobet-seg-btn" data-action="increase" data-target="onLoss">Increase by</button>
            </div>
            <div class="autobet-pct" id="onLossPct" style="display:none">
              <input class="autobet-pct-input" type="number" value="100" min="1" max="500">
              <span class="autobet-pct-sign">%</span>
            </div>
          </div>
        </div>

        <!-- Stop on Profit -->
        <div class="autobet-field">
          <span class="autobet-label">Stop on Profit</span>
          <div class="autobet-stop-row">
            <div class="currency-tag">$</div>
            <input class="autobet-input autobet-stop-input" type="number" placeholder="0.00" step="0.01" min="0">
          </div>
        </div>

        <!-- Stop on Loss -->
        <div class="autobet-field">
          <span class="autobet-label">Stop on Loss</span>
          <div class="autobet-stop-row">
            <div class="currency-tag">$</div>
            <input class="autobet-input autobet-stop-input" type="number" placeholder="0.00" step="0.01" min="0">
          </div>
        </div>

      </div>

      <!-- Settings Bar -->
      <div class="settings-bar">
        <div class="settings-left">
          <button class="settings-btn" id="settingsBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
          <button class="settings-btn" id="infoBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
          </button>
          <button class="settings-btn" id="chartBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          </button>
        </div>
        <button class="settings-btn" id="fairnessBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </button>
      </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="#" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      Explore
    </a>
    <a href="casino.html" class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C6.48 2 2 6 2 10c0 5.25 10 12 10 12s10-6.75 10-12c0-4-4.48-8-10-8z"/></svg>
      Casino
    </a>
    <a href="#" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 9l6 6 6-6"/><path d="M12 3v12"/><rect x="3" y="17" width="18" height="4" rx="1"/></svg>
      Sports
    </a>
  </nav>

</div>

<script>
  // ── State ──
  const betInput = document.getElementById('betAmount');
  const potentialWin = document.getElementById('potentialWin');
  const multInput = document.getElementById('multInput');
  const winProbInput = document.getElementById('winProbInput');
  const modeLabel = document.getElementById('modeLabel');
  const sliderA = document.getElementById('sliderA');
  const sliderB = document.getElementById('sliderB');
  const sliderValA = document.getElementById('sliderValA');
  const sliderValB = document.getElementById('sliderValB');
  const sliderSep = document.getElementById('sliderSep');
  const sliderFill = document.getElementById('sliderFill');
  const balance = 0.02;
  let currentMode = 'rollover';

  // ── Multiplier calc ──
  function getMultiplier() {
    const a = parseInt(sliderA.value);
    const b = parseInt(sliderB.value);
    let winChance;
    if (currentMode === 'rollover') winChance = (100 - a) / 100;
    else if (currentMode === 'rollunder') winChance = (a - 1) / 100;
    else if (currentMode === 'between') {
      const lo = Math.min(a, b), hi = Math.max(a, b);
      winChance = (hi - lo + 1) / 100;
    } else {
      const lo = Math.min(a, b), hi = Math.max(a, b);
      winChance = (100 - (hi - lo + 1)) / 100;
    }
    winChance = Math.max(winChance, 0.01);
    return Math.floor((0.99 / winChance) * 10000) / 10000;
  }

  // ── Update UI ──
  function updateSliderUI() {
    const a = parseInt(sliderA.value);
    const b = parseInt(sliderB.value);
    const isRange = currentMode === 'between' || currentMode === 'outside';

    sliderValA.textContent = a;
    sliderValB.textContent = b;
    sliderSep.style.display = isRange ? '' : 'none';
    sliderValB.style.display = isRange ? '' : 'none';
    sliderB.style.display = isRange ? '' : 'none';

    // Fill bar
    if (currentMode === 'rollover') {
      sliderFill.style.left = a + '%';
      sliderFill.style.width = (100 - a) + '%';
    } else if (currentMode === 'rollunder') {
      sliderFill.style.left = '0%';
      sliderFill.style.width = a + '%';
    } else {
      const lo = Math.min(a, b), hi = Math.max(a, b);
      if (currentMode === 'between') {
        sliderFill.style.left = lo + '%';
        sliderFill.style.width = (hi - lo) + '%';
      } else {
        sliderFill.style.left = '0%';
        sliderFill.style.width = '100%';
        // For outside, we show two filled regions via a gradient
        sliderFill.style.background = `linear-gradient(to right, var(--green-primary) ${lo}%, rgba(255,255,255,0.1) ${lo}%, rgba(255,255,255,0.1) ${hi}%, var(--green-primary) ${hi}%)`;
      }
    }
    if (currentMode !== 'outside') {
      sliderFill.style.background = '';
    }

    // Mode label
    const labels = {
      rollover: `Roll over ${a} to win`,
      rollunder: `Roll under ${a} to win`,
      between: `Roll ${Math.min(a,b)}–${Math.max(a,b)} to win`,
      outside: `Roll outside ${Math.min(a,b)}–${Math.max(a,b)} to win`
    };
    modeLabel.textContent = labels[currentMode];

    // Multiplier & win probability
    const mult = getMultiplier();
    const winChance = Math.min(99, Math.max(0.01, (0.99 / mult) * 100));
    multInput.value = mult.toFixed(4);
    winProbInput.value = parseFloat(winChance.toFixed(2));
    updateWin(mult);
  }

  function updateWin(mult) {
    const m = mult || getMultiplier();
    const val = parseFloat(betInput.value) || 0;
    const win = (val * m).toFixed(2);
    potentialWin.textContent = `Win: $${win} (${m.toFixed(2)}x)`;
  }

  // ── Slider events ──
  sliderA.addEventListener('input', updateSliderUI);
  sliderB.addEventListener('input', updateSliderUI);
  betInput.addEventListener('input', () => updateWin());

  // ── Quick amount buttons ──
  document.querySelectorAll('.quick-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const action = btn.dataset.action;
      let val = parseFloat(betInput.value) || 0;
      if (action === 'half') val = val / 2;
      if (action === 'double') val = val * 2;
      if (action === 'max') val = balance;
      betInput.value = Math.max(0, Math.min(val, balance)).toFixed(2);
      updateWin();
    });
  });

  // ── Game type chips ──
  document.querySelectorAll('.option-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.option-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      currentMode = chip.dataset.type;
      // Reset slider defaults per mode
      if (currentMode === 'rollover') { sliderA.value = 50; }
      else if (currentMode === 'rollunder') { sliderA.value = 50; }
      else if (currentMode === 'between') { sliderA.value = 30; sliderB.value = 70; }
      else if (currentMode === 'outside') { sliderA.value = 40; sliderB.value = 60; }
      updateSliderUI();
    });
  });

  // ── Bet button ──
  const resultTrack = document.getElementById('resultTrack');
  const viewportDice = document.querySelector('.viewport-dice');

  function rollDice() {
    const roll = Math.floor(Math.random() * 100) + 1;
    const a = parseInt(sliderA.value);
    const b = parseInt(sliderB.value);
    let isWin = false;

    if (currentMode === 'rollover') isWin = roll > a;
    else if (currentMode === 'rollunder') isWin = roll < a;
    else if (currentMode === 'between') {
      const lo = Math.min(a, b), hi = Math.max(a, b);
      isWin = roll >= lo && roll <= hi;
    } else {
      const lo = Math.min(a, b), hi = Math.max(a, b);
      isWin = roll < lo || roll > hi;
    }

    const mult = getMultiplier();

    // Update dice display with roll
    sliderValA.textContent = a;
    viewportDice.textContent = roll;

    // Show result pill (newest at top)
    const pill = document.createElement('div');
    pill.className = `result-pill ${isWin ? 'win' : 'loss'}`;
    pill.textContent = isWin ? '+' + mult.toFixed(2) + 'x' : '0.00x';
    resultTrack.appendChild(pill);

    // Keep scroll pinned to newest (right side, near rakeback)
    resultTrack.scrollLeft = resultTrack.scrollWidth;

    // Button press effect
    const btn = document.getElementById('betBtn');
    btn.style.transform = 'scale(0.95)';
    setTimeout(() => btn.style.transform = '', 150);
  }

  document.getElementById('betBtn').addEventListener('click', rollDice);

  // ── Bet mode toggle ──
  const autobetPanel = document.getElementById('autobetSettings');
  const manualPanel = document.getElementById('manualSettings');
  document.querySelectorAll('.bet-mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.bet-mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const isAuto = btn.dataset.mode === 'auto';
      autobetPanel.style.display = isAuto ? '' : 'none';
      manualPanel.style.display = isAuto ? 'none' : '';
      document.getElementById('betBtn').querySelector('.btn-content').textContent = isAuto ? 'Start Autobet' : 'Bet Now';
    });
  });

  // ── Manual settings: reverse sync (input → slider) ──
  function setSliderFromMultiplier(mult) {
    mult = Math.max(1.01, mult);
    const winChance = 0.99 / mult;
    if (currentMode === 'rollover') {
      sliderA.value = Math.round(100 - winChance * 100);
    } else if (currentMode === 'rollunder') {
      sliderA.value = Math.round(winChance * 100 + 1);
    }
    // For between/outside, reverse is ambiguous so we don't adjust the slider
    updateSliderUI();
  }

  multInput.addEventListener('change', () => {
    const val = parseFloat(multInput.value);
    if (val && val >= 1.01) setSliderFromMultiplier(val);
  });

  winProbInput.addEventListener('change', () => {
    const wp = parseFloat(winProbInput.value);
    if (wp && wp >= 0.01 && wp <= 99) {
      const mult = Math.floor((0.99 / (wp / 100)) * 10000) / 10000;
      setSliderFromMultiplier(mult);
    }
  });

  // ── Autobet number chips ──
  document.querySelectorAll('.autobet-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const v = chip.dataset.bets;
      document.getElementById('numBets').value = v === 'Infinity' ? '' : v;
      if (v === 'Infinity') document.getElementById('numBets').placeholder = '∞';
    });
  });

  // ── On Win / On Loss segmented toggles ──
  document.querySelectorAll('.autobet-seg-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const seg = btn.closest('.autobet-seg');
      seg.querySelectorAll('.autobet-seg-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const target = btn.dataset.target;
      const pctEl = document.getElementById(target + 'Pct');
      pctEl.style.display = btn.dataset.action === 'increase' ? '' : 'none';
    });
  });

  // ── Init ──
  updateSliderUI();
</script>

</body>
</html>
