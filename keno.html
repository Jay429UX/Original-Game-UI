<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dicey — Keno</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0b0a;
    --surface: #111311;
    --surface-raised: #161816;
    --border: #1e201e;
    --border-focus: #00ab4c;
    --green-primary: #00ab4c;
    --green-glow: transparent;
    --green-dark: #007a36;
    --green-gradient-start: #0a1a0f;
    --green-gradient-end: #00ab4c;
    --text-primary: #e8eee8;
    --text-secondary: #6b756b;
    --text-muted: #3d433d;
    --radius: 8px;
    --radius-sm: 8px;
    --radius-xs: 8px;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* ── Shell ── */
  .app-shell {
    width: 100%;
    max-width: 420px;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    background: #0e100f;
    border: 1px solid rgba(255, 255, 255, 0.05);
    padding-bottom: 70px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    position: relative;
    z-index: 10;
  }

  .header-brand {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header-brand svg {
    width: 22px;
    height: 22px;
    fill: var(--text-primary);
  }

  .header-brand span {
    font-weight: 700;
    font-size: 18px;
    letter-spacing: -0.02em;
  }

  .header-brand small {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--text-secondary);
    display: block;
    margin-top: -2px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header-casino-link {
    display: none;
    align-items: center;
    gap: 6px;
    font-size: 14px;
    font-weight: 600;
    color: var(--green-primary);
    text-decoration: none;
    padding: 6px 12px;
    border-radius: var(--radius);
    transition: background 0.15s;
  }
  .header-casino-link:hover {
    background: rgba(0, 171, 76, 0.1);
  }
  .header-casino-link svg {
    width: 16px;
    height: 16px;
  }

  .balance-pill {
    background: var(--surface-raised);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 14px 6px 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
  }

  .balance-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green-primary);
  }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: var(--surface-raised);
    border: 1.5px solid var(--border);
    display: grid;
    place-items: center;
    font-size: 16px;
  }

  /* ── Main content ── */
  .main-content {
    display: flex;
    flex-direction: column;
    padding: 0 16px 16px;
    gap: 0;
  }

  /* ── Game Viewport ── */
  .game-viewport {
    border-radius: var(--radius) var(--radius) 0 0;
    overflow: hidden;
    position: relative;
    background: #0a0b0a;
    border: 1px solid var(--border);
    border-bottom: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    padding: 12px 8px 0;
    height: calc(100dvh - 50px - 70px - 48px - 110px - 32px);
    min-height: 200px;
  }

  .game-viewport .game-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    width: 100%;
    overflow: hidden;
  }

  .game-bottom {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: rgba(0, 0, 0, 0.55);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: var(--radius);
    padding: 14px 14px 14px;
    backdrop-filter: blur(12px);
    margin-top: 10px;
    margin-bottom: 12px;
    flex-shrink: 0;
  }

  .game-viewport::before {
    content: '';
    position: absolute;
    inset: 0;
    background: none;
    pointer-events: none;
  }

  .game-viewport::after {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='40' height='40' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='1' cy='1' r='0.6' fill='rgba(255,255,255,0.03)'/%3E%3C/svg%3E");
    pointer-events: none;
  }

  /* ── Bet Controls Wrapper ── */
  .bet-controls {
    background: #161816;
    border-radius: 0 0 var(--radius) var(--radius);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-top: none;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    flex-shrink: 0;
  }

  /* ── Bet Mode Toggle ── */
  .bet-mode-toggle {
    display: flex;
    background: var(--surface);
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    overflow: hidden;
    padding: 4px;
    gap: 4px;
  }

  .bet-mode-btn {
    flex: 1;
    padding: 9px 10px;
    border: none;
    border-radius: var(--radius-xs);
    background: transparent;
    color: var(--text-muted);
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .bet-mode-btn.active {
    background: var(--surface-raised);
    color: var(--text-primary);
  }

  /* ── Manual Bet Settings ── */
  .manual-settings {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .stat-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-xs);
  }

  .stat-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 0.02em;
  }

  .stat-value-wrap {
    display: flex;
    align-items: center;
    gap: 2px;
  }

  .stat-input {
    width: 90px;
    padding: 0;
    border: none;
    outline: none;
    background: transparent;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
    text-align: right;
    caret-color: var(--green-primary);
    -moz-appearance: textfield;
  }

  .stat-input::-webkit-outer-spin-button,
  .stat-input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  .stat-suffix {
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--text-secondary);
  }

  /* ── Auto Bet Settings ── */
  .autobet-settings {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .autobet-field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .autobet-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 0.04em;
  }

  .autobet-input-row {
    display: flex;
    align-items: stretch;
    gap: 0;
    border-radius: var(--radius-xs);
    border: 1px solid var(--border);
    background: var(--surface);
    overflow: hidden;
  }

  .autobet-input {
    flex: 1;
    min-width: 0;
    padding: 14px 14px;
    border: none;
    outline: none;
    background: transparent;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 500;
    color: var(--text-primary);
    caret-color: var(--green-primary);
  }

  .autobet-input::placeholder {
    color: var(--text-muted);
  }

  .autobet-chips {
    display: flex;
    align-items: center;
    border-left: 1px solid var(--border);
  }

  .autobet-chip {
    padding: 10px 12px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: color 0.15s ease, background 0.15s ease;
    border-left: 1px solid var(--border);
  }

  .autobet-chip:first-child {
    border-left: none;
  }

  .autobet-chip:hover {
    color: var(--green-primary);
    background: rgba(0, 171, 76, 0.06);
  }

  .autobet-toggle-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .autobet-seg {
    display: flex;
    background: var(--surface);
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    overflow: hidden;
    padding: 4px;
    gap: 4px;
  }

  .autobet-seg-btn {
    flex: 1;
    padding: 9px 8px;
    border: none;
    border-radius: var(--radius-xs);
    background: transparent;
    color: var(--text-muted);
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .autobet-seg-btn.active {
    background: var(--surface-raised);
    color: var(--text-primary);
  }

  .autobet-pct {
    display: flex;
    align-items: center;
    border-radius: var(--radius-xs);
    border: 1px solid var(--border);
    background: var(--surface);
    overflow: hidden;
  }

  .autobet-pct-input {
    flex: 1;
    min-width: 0;
    padding: 8px 12px;
    border: none;
    outline: none;
    background: transparent;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    caret-color: var(--green-primary);
  }

  .autobet-pct-sign {
    padding: 8px 12px;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    border-left: 1px solid var(--border);
    background: var(--surface-raised);
  }

  .autobet-stop-row {
    display: flex;
    align-items: stretch;
    border-radius: var(--radius-xs);
    border: 1px solid var(--border);
    background: var(--surface);
    overflow: hidden;
  }

  .autobet-stop-row .currency-tag {
    padding: 0 10px;
    font-size: 13px;
  }

  .autobet-stop-input {
    border: none !important;
    border-radius: 0 !important;
  }

  /* ── Turbo Toggle ── */
  .turbo-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-xs);
  }

  .turbo-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 0.04em;
  }

  .turbo-toggle {
    position: relative;
    width: 40px;
    height: 22px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 11px;
    cursor: pointer;
    transition: background 0.2s ease;
    border: none;
    padding: 0;
  }

  .turbo-toggle.active {
    background: var(--green-primary);
  }

  .turbo-toggle::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #fff;
    transition: transform 0.2s ease;
  }

  .turbo-toggle.active::after {
    transform: translateX(18px);
  }

  /* ── Bet Button ── */
  .bet-button {
    width: 100%;
    height: 48px;
    padding: 0 16px;
    border: none;
    border-radius: var(--radius);
    background: var(--green-primary);
    color: #fff;
    font-family: 'Outfit', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.01em;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.15);
  }

  .bet-button:active {
    transform: scale(0.97);
    box-shadow: none;
  }

  .bet-button::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, transparent 50%);
    pointer-events: none;
  }

  .bet-button::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }

  .bet-button:hover::after {
    opacity: 1;
  }

  .bet-button .btn-content {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .bet-button .btn-content svg {
    width: 18px;
    height: 18px;
  }

  /* ── Bet Input Group ── */
  .input-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .input-label {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .input-label span {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    letter-spacing: 0.04em;
  }

  .input-label .potential-win {
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    color: var(--green-primary);
    text-transform: none;
    letter-spacing: 0;
  }

  .input-row {
    display: flex;
    align-items: stretch;
    gap: 0;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface);
    overflow: hidden;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }

  .input-row:focus-within {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(0, 171, 76, 0.15);
  }

  .currency-tag {
    display: flex;
    align-items: center;
    padding: 0 12px;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    background: var(--surface-raised);
    border-right: 1px solid var(--border);
    user-select: none;
  }

  .bet-input {
    flex: 1;
    min-width: 0;
    padding: 18px 12px;
    border: none;
    outline: none;
    background: transparent;
    font-family: 'Outfit', sans-serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--text-primary);
    caret-color: var(--green-primary);
  }

  .bet-input::placeholder {
    color: var(--text-muted);
  }

  .quick-amounts {
    display: flex;
    align-items: center;
    border-left: 1px solid var(--border);
  }

  .quick-btn {
    min-width: 48px;
    padding: 18px 0;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: color 0.15s ease, background 0.15s ease;
    border-left: 1px solid var(--border);
    text-align: center;
  }

  .quick-btn:first-child {
    border-left: none;
  }

  .quick-btn:hover {
    color: var(--green-primary);
    background: rgba(0, 171, 76, 0.06);
  }

  .quick-btn:active {
    background: rgba(0, 171, 76, 0.1);
  }

  /* ── Keno Board ── */
  .keno-container {
    position: relative;
    z-index: 1;
    width: 100%;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }

  .keno-board {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 6px;
    width: 100%;
    max-width: 380px;
  }

  .keno-tile {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s ease;
    user-select: none;
    position: relative;
  }

  .keno-tile:hover:not(.locked) {
    border-color: rgba(255, 255, 255, 0.2);
    color: var(--text-primary);
  }

  .keno-tile:active:not(.locked) {
    transform: scale(0.93);
  }

  .keno-tile.selected {
    background: rgba(0, 171, 76, 0.15);
    border-color: var(--green-primary);
    color: #fff;
    box-shadow: 0 0 0 1px rgba(0, 171, 76, 0.3);
  }

  .keno-tile.hit {
    background: var(--green-primary);
    border-color: var(--green-primary);
    color: #fff;
    box-shadow: 0 0 12px rgba(0, 171, 76, 0.5);
    animation: tileHit 0.4s ease;
  }

  .keno-tile.drawn {
    background: rgba(255, 255, 255, 0.06);
    border-color: rgba(255, 255, 255, 0.15);
    color: rgba(255, 255, 255, 0.5);
  }

  .keno-tile.missed {
    background: rgba(220, 38, 38, 0.15);
    border-color: rgba(220, 38, 38, 0.4);
    color: #f87171;
  }

  .keno-tile.locked {
    cursor: default;
  }

  @keyframes tileHit {
    0% { transform: scale(1); }
    40% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  /* ── Keno Settings ── */
  .keno-settings {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
  }

  /* ── Risk Toggle ── */
  .risk-toggle {
    display: flex;
    background: rgba(0, 0, 0, 0.55);
    border-radius: var(--radius-sm);
    border: 1px solid rgba(255, 255, 255, 0.08);
    overflow: hidden;
    padding: 3px;
    gap: 3px;
  }

  .risk-btn {
    flex: 1;
    padding: 8px 6px;
    border: none;
    border-radius: var(--radius-xs);
    background: transparent;
    color: rgba(255, 255, 255, 0.4);
    font-family: 'Outfit', sans-serif;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .risk-btn.active {
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
  }

  .risk-btn:hover:not(.active) {
    color: rgba(255, 255, 255, 0.6);
  }

  /* ── Pick Controls ── */
  .pick-controls {
    display: flex;
    gap: 6px;
  }

  .pick-btn {
    flex: 1;
    padding: 8px 8px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: var(--radius-xs);
    background: rgba(0, 0, 0, 0.55);
    color: rgba(255, 255, 255, 0.5);
    font-family: 'Outfit', sans-serif;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: center;
  }

  .pick-btn:hover {
    color: rgba(255, 255, 255, 0.8);
    border-color: rgba(255, 255, 255, 0.15);
  }

  .pick-btn:active {
    transform: scale(0.96);
  }

  .pick-count-select {
    width: 52px;
    padding: 8px 4px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: var(--radius-xs);
    background: rgba(0, 0, 0, 0.55);
    color: rgba(255, 255, 255, 0.5);
    font-family: 'Outfit', sans-serif;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    -webkit-appearance: none;
    appearance: none;
  }

  .pick-count-select option {
    background: var(--surface);
    color: var(--text-primary);
  }

  /* ── Hits Counter (shown during draw) ── */
  .hits-counter {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 6px 14px;
    background: rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 100px;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    backdrop-filter: blur(8px);
    margin-top: 8px;
    flex-shrink: 0;
  }

  .hits-counter.visible {
    display: flex;
  }

  .hits-counter .hit-count {
    color: var(--green-primary);
    font-weight: 700;
  }

  /* ── Settings Bar ── */
  .settings-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 2px 0;
    border-top: 1px solid var(--border);
    position: relative;
  }

  /* ── Desktop Settings Strip (hidden on mobile) ── */
  .desktop-settings-strip { display: none; }

  .settings-popup {
    display: none;
    position: absolute;
    bottom: 52px;
    left: 0;
    width: 220px;
    background: var(--surface-raised);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    flex-direction: column;
    gap: 12px;
    z-index: 30;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
  }
  .settings-popup.visible { display: flex; }

  .settings-popup-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.01em;
  }

  .settings-popup-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .settings-popup-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
  }

  .settings-toggle {
    position: relative;
    width: 40px;
    height: 22px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 11px;
    cursor: pointer;
    transition: background 0.2s ease;
    border: none;
    padding: 0;
  }
  .settings-toggle.active { background: var(--green-primary); }
  .settings-toggle::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #fff;
    transition: transform 0.2s ease;
  }
  .settings-toggle.active::after { transform: translateX(18px); }

  .settings-left {
    display: flex;
    align-items: center;
    gap: 2px;
  }

  .settings-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 6px;
    border-radius: var(--radius-xs);
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--text-secondary);
    transition: color 0.15s ease, background 0.15s ease;
  }

  .settings-btn svg {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }

  .settings-btn:hover {
    color: var(--text-primary);
    background: rgba(255,255,255,0.04);
  }

  .settings-btn:active {
    background: rgba(255,255,255,0.06);
  }

  .settings-btn.active {
    color: var(--green-primary);
  }

  .settings-label {
    font-family: 'Outfit', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.01em;
    white-space: nowrap;
  }

  .settings-divider {
    width: 1px;
    height: 18px;
    background: var(--border);
    flex-shrink: 0;
  }

  /* ── Bottom Nav ── */
  .bottom-nav {
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 10px 16px 20px;
    border-top: 1px solid var(--border);
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 420px;
    background: #0e100f;
    z-index: 20;
  }

  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 6px 20px;
    border-radius: var(--radius-sm);
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    font-family: 'Outfit', sans-serif;
    font-size: 11px;
    text-decoration: none;
    font-weight: 600;
    transition: color 0.15s ease;
  }

  .nav-item svg {
    width: 20px;
    height: 20px;
  }

  .nav-item.active {
    color: var(--green-primary);
    background: rgba(0, 171, 76, 0.06);
  }

  .nav-item:hover:not(.active) {
    color: var(--text-secondary);
  }

  /* ── Result Pill ── */
  .rakeback-row {
    position: absolute;
    top: 10px;
    left: 0;
    right: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 6px;
    pointer-events: none;
  }

  .rakeback-pill {
    flex-shrink: 0;
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(0, 0, 0, 0.45);
    border: 1px solid rgba(255, 255, 255, 0.08);

    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);

    border-radius: 4px;
  }

  .result-pill-track {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
    min-height: 0;
    flex: 1;
    min-width: 0;
    mask-image: linear-gradient(to right, transparent, black 40px);
    -webkit-mask-image: linear-gradient(to right, transparent, black 40px);
  }
  .result-pill-track::-webkit-scrollbar { display: none; }

  .result-pill {
    display: inline-flex;
    align-items: center;
    padding: 4px 12px;
    border-radius: 100px;
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
    animation: pillSlideIn 0.3s ease forwards;
  }

  .result-pill.win {
    background: rgba(0, 171, 76, 0.2);
    border: 1px solid rgba(0, 171, 76, 0.4);
    color: #00e65a;
  }

  .result-pill.loss {
    background: rgba(220, 38, 38, 0.2);
    border: 1px solid rgba(220, 38, 38, 0.4);
    color: #f87171;
  }

  @keyframes pillSlideIn {
    from { transform: translateX(40px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  /* ── Error Message ── */
  .bet-error {
    display: none;
    align-items: center;
    gap: 6px;
    padding: 10px 14px;
    background: rgba(220, 38, 38, 0.1);
    border: 1px solid rgba(220, 38, 38, 0.3);

    font-size: 13px;
    font-weight: 500;
    color: #f87171;
    animation: errorShake 0.3s ease;
  }

  .bet-error.visible {
    display: flex;
  }

  @keyframes errorShake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  .input-row.error {
    border-color: rgba(220, 38, 38, 0.5);
    box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.15);

  /* ── Responsive ── */

  }

  /* ══ Desktop Layout ══ */
  @media (min-width: 768px) {
    .app-shell { max-width: 1200px; }

    /* Hide original settings bar on desktop */
    .settings-bar { display: none; }

    /* Desktop settings strip — full width bottom */
    .desktop-settings-strip {

  }
</style>

<script>
  // ── DOM Elements ──
  const betInput = document.getElementById('betAmount');
  const potentialWin = document.getElementById('potentialWin');
  const multInput = document.getElementById('multInput');
  const tilesInput = document.getElementById('tilesInput');
  const resultTrack = document.getElementById('resultTrack');
  const kenoBoard = document.getElementById('kenoBoard');
  const hitsCounter = document.getElementById('hitsCounter');
  const hitCountEl = document.getElementById('hitCount');
  const pickCountEl = document.getElementById('pickCount');

  // ── Game State ──
  const TOTAL_TILES = 40;
  const DRAW_COUNT = 10;
  const MAX_PICKS = 10;
  const balance = 100;
  let currentRisk = 'classic';
  let selectedTiles = new Set();
  let isDrawing = false;
  let turboMode = false;

  // ── Multiplier Tables ──
  // payoutTables[risk][numPicks][numHits]
  const payoutTables = {
    classic: {
      1: [0, 3.96],
      2: [0, 1.8, 5.1],
      3: [0, 0, 2.8, 25],
      4: [0, 0, 1.5, 8, 60],
      5: [0, 0, 1, 3, 14, 200],
      6: [0, 0, 0.5, 2, 6, 50, 500],
      7: [0, 0, 0, 1.5, 4, 12, 100, 1500],
      8: [0, 0, 0, 1, 3, 8, 25, 200, 5000],
      9: [0, 0, 0, 0.5, 2, 5, 15, 50, 500, 15000],
      10: [0, 0, 0, 0, 1.5, 3, 10, 30, 200, 1000, 50000]
    },
    low: {
      1: [0, 2.85],
      2: [0, 1.5, 4],
      3: [0, 1, 2, 14],
      4: [0, 0.5, 1.5, 5, 30],
      5: [0, 0.5, 1, 2.5, 8, 80],
      6: [0, 0.5, 0.8, 1.5, 4, 20, 200],
      7: [0, 0, 0.5, 1.2, 3, 8, 40, 400],
      8: [0, 0, 0.5, 1, 2, 5, 15, 80, 1000],
      9: [0, 0, 0, 0.8, 1.5, 3, 8, 25, 100, 2500],
      10: [0, 0, 0, 0.5, 1.2, 2, 5, 15, 50, 250, 5000]
    },
    medium: {
      1: [0, 3.96],
      2: [0, 1.8, 6],
      3: [0, 0, 3, 40],
      4: [0, 0, 1.5, 10, 100],
      5: [0, 0, 0.8, 4, 20, 400],
      6: [0, 0, 0, 2, 8, 80, 1500],
      7: [0, 0, 0, 1, 5, 20, 200, 5000],
      8: [0, 0, 0, 0.5, 3, 10, 50, 500, 20000],
      9: [0, 0, 0, 0, 2, 6, 20, 100, 2000, 75000],
      10: [0, 0, 0, 0, 1, 4, 12, 60, 500, 5000, 250000]
    },
    high: {
      1: [0, 3.96],
      2: [0, 0, 14],
      3: [0, 0, 0, 90],
      4: [0, 0, 0, 4, 400],
      5: [0, 0, 0, 0, 20, 1200],
      6: [0, 0, 0, 0, 4, 100, 5000],
      7: [0, 0, 0, 0, 2, 15, 300, 15000],
      8: [0, 0, 0, 0, 0, 8, 60, 1500, 50000],
      9: [0, 0, 0, 0, 0, 4, 20, 200, 5000, 200000],
      10: [0, 0, 0, 0, 0, 2, 10, 80, 1000, 20000, 1000000]
    }
  };

  // ── Generate Board ──
  function generateBoard() {
    kenoBoard.innerHTML = '';
    for (let i = 1; i <= TOTAL_TILES; i++) {
      const tile = document.createElement('div');
      tile.className = 'keno-tile';
      tile.textContent = i;
      tile.dataset.number = i;
      tile.addEventListener('click', () => toggleTile(i, tile));
      kenoBoard.appendChild(tile);
    }
  }

  // ── Toggle Tile Selection ──
  function toggleTile(num, tile) {
    if (isDrawing) return;

    if (selectedTiles.has(num)) {
      selectedTiles.delete(num);
      tile.classList.remove('selected');
    } else {
      if (selectedTiles.size >= MAX_PICKS) return; // Max 10
      selectedTiles.add(num);
      tile.classList.add('selected');
    }
    updateDisplay();
  }

  // ── Auto Pick ──
  function autoPick(count) {
    if (isDrawing) return;
    clearAll();
    const available = [];
    for (let i = 1; i <= TOTAL_TILES; i++) available.push(i);

    // Fisher-Yates shuffle
    for (let i = available.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [available[i], available[j]] = [available[j], available[i]];
    }

    const picks = available.slice(0, Math.min(count, MAX_PICKS));
    const tiles = kenoBoard.querySelectorAll('.keno-tile');
    picks.forEach(num => {
      selectedTiles.add(num);
      tiles[num - 1].classList.add('selected');
    });
    updateDisplay();
  }

  // ── Clear All ──
  function clearAll() {
    if (isDrawing) return;
    selectedTiles.clear();
    kenoBoard.querySelectorAll('.keno-tile').forEach(t => {
      t.classList.remove('selected', 'hit', 'drawn', 'missed', 'locked');
    });
    hitsCounter.classList.remove('visible');
    updateDisplay();
  }

  // ── Update Display ──
  function updateDisplay() {
    const count = selectedTiles.size;
    tilesInput.value = count;
    pickCountEl.textContent = count;

    if (count === 0) {
      multInput.value = '—';
      potentialWin.textContent = 'Select tiles to play';
      return;
    }

    const table = payoutTables[currentRisk][count];
    const maxMult = table ? Math.max(...table) : 0;
    multInput.value = maxMult >= 1000 ? maxMult.toLocaleString() : maxMult;

    const val = parseFloat(betInput.value) || 0;
    const maxWin = (val * maxMult).toFixed(2);
    potentialWin.textContent = `Max: $${maxWin} (${maxMult >= 1000 ? maxMult.toLocaleString() : maxMult}x)`;
  }

  // ── Play Round ──
  function playRound() {
    if (isDrawing) return;
    if (selectedTiles.size === 0) {
      betError.textContent = 'Please select at least one tile';
      betError.classList.add('visible');
      return;
    }
    if (!validateBet()) return;

    isDrawing = true;

    // Lock all tiles
    kenoBoard.querySelectorAll('.keno-tile').forEach(t => {
      t.classList.add('locked');
      // Reset draw classes but keep selection
      t.classList.remove('hit', 'drawn', 'missed');
    });

    // Show hits counter
    hitCountEl.textContent = '0';
    pickCountEl.textContent = selectedTiles.size;
    hitsCounter.classList.add('visible');

    // Draw 10 random numbers
    const pool = [];
    for (let i = 1; i <= TOTAL_TILES; i++) pool.push(i);
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    const drawnNumbers = pool.slice(0, DRAW_COUNT);

    // Animate draws
    animateDraw(drawnNumbers);
  }

  // ── Animate Draw ──
  function animateDraw(drawnNumbers) {
    const tiles = kenoBoard.querySelectorAll('.keno-tile');
    const delay = turboMode ? 80 : 300;
    let hits = 0;
    let drawIndex = 0;

    function revealNext() {
      if (drawIndex >= drawnNumbers.length) {
        // Draw complete — show result
        finishRound(hits);
        return;
      }

      const num = drawnNumbers[drawIndex];
      const tile = tiles[num - 1];

      if (selectedTiles.has(num)) {
        // HIT!
        tile.classList.remove('selected');
        tile.classList.add('hit');
        hits++;
        hitCountEl.textContent = hits;
      } else {
        // Drawn but not selected
        tile.classList.add('drawn');
      }

      drawIndex++;
      setTimeout(revealNext, delay);
    }

    revealNext();
  }

  // ── Finish Round ──
  function finishRound(hits) {
    const numPicks = selectedTiles.size;

    // Mark selected tiles that weren't hit as missed
    const tiles = kenoBoard.querySelectorAll('.keno-tile');
    selectedTiles.forEach(num => {
      const tile = tiles[num - 1];
      if (!tile.classList.contains('hit')) {
        tile.classList.add('missed');
      }
    });

    // Look up multiplier
    const table = payoutTables[currentRisk][numPicks];
    const multiplier = table ? (table[hits] || 0) : 0;

    // Show result
    showResult(multiplier, hits, numPicks);

    // Unlock after a brief pause
    const resetDelay = turboMode ? 300 : 800;
    setTimeout(() => {
      // Reset tiles to just selected state
      tiles.forEach(t => {
        t.classList.remove('hit', 'drawn', 'missed', 'locked');
      });
      selectedTiles.forEach(num => {
        tiles[num - 1].classList.add('selected');
      });
      hitsCounter.classList.remove('visible');
      isDrawing = false;

      // If autobet is running, trigger next
      if (autobetRunning) {
        handleAutobetResult(multiplier);
      }
    }, resetDelay);
  }

  // ── Show Result ──
  function showResult(multiplier, hits, picks) {
    const isWin = multiplier >= 1;

    const pill = document.createElement('div');
    pill.className = `result-pill ${isWin ? 'win' : 'loss'}`;
    if (multiplier > 0) {
      pill.textContent = isWin ? '+' + (multiplier >= 1000 ? multiplier.toLocaleString() : multiplier) + 'x' : multiplier + 'x';
    } else {
      pill.textContent = '0x';
    }
    resultTrack.appendChild(pill);
    resultTrack.scrollLeft = resultTrack.scrollWidth;

    // Button press effect
    const btn = document.getElementById('betBtn');
    btn.style.transform = 'scale(0.95)';
    setTimeout(() => btn.style.transform = '', 150);
  }

  // ── Bet Validation ──
  const betError = document.getElementById('betError');
  const inputRow = betInput.closest('.input-row');

  function validateBet() {
    const val = parseFloat(betInput.value) || 0;
    if (val > balance) {
      betError.textContent = `Bet amount exceeds your balance of $${balance.toFixed(2)}`;
      betError.classList.add('visible');
      inputRow.classList.add('error');
      return false;
    }
    if (val <= 0) {
      betError.textContent = 'Please enter a bet amount';
      betError.classList.add('visible');
      inputRow.classList.add('error');
      return false;
    }
    betError.classList.remove('visible');
    inputRow.classList.remove('error');
    return true;
  }

  function clearError() {
    const val = parseFloat(betInput.value) || 0;
    if (val <= balance && val > 0) {
      betError.classList.remove('visible');
      inputRow.classList.remove('error');
    }
  }

  betInput.addEventListener('input', () => {
    clearError();
    updateDisplay();
  });

  // ── Autobet State ──
  let isAutoMode = false;
  let autobetRunning = false;
  let autobetCount = 0;
  let autobetTarget = 0;
  let autobetOriginalBet = 0;
  let autobetProfit = 0;
  let onWinAction = 'reset';
  let onLossAction = 'reset';
  const betBtnEl = document.getElementById('betBtn');
  const btnContent = betBtnEl.querySelector('.btn-content');

  // ── Bet Handler ──
  betBtnEl.addEventListener('click', () => {
    if (!isAutoMode) {
      playRound();
    } else {
      if (autobetRunning) {
        stopAutobet();
      } else {
        if (selectedTiles.size === 0) {
          betError.textContent = 'Please select at least one tile';
          betError.classList.add('visible');
          return;
        }
        if (!validateBet()) return;
        startAutobet();
      }
    }
  });

  function startAutobet() {
    const numBetsInput = document.getElementById('numBets');
    const targetBets = parseInt(numBetsInput.value);
    autobetTarget = isNaN(targetBets) || targetBets <= 0 ? Infinity : targetBets;
    autobetCount = 0;
    autobetProfit = 0;
    autobetOriginalBet = parseFloat(betInput.value) || 0;
    autobetRunning = true;

    // Read on win/loss settings
    const winSeg = document.querySelector('.autobet-seg-btn.active[data-target="onWin"]');
    onWinAction = winSeg ? winSeg.dataset.action : 'reset';
    const lossSeg = document.querySelector('.autobet-seg-btn.active[data-target="onLoss"]');
    onLossAction = lossSeg ? lossSeg.dataset.action : 'reset';

    btnContent.textContent = 'Stop Autobet';
    betBtnEl.style.background = '#dc2626';
    runNextAutoBet();
  }

  function stopAutobet() {
    autobetRunning = false;
    btnContent.textContent = 'Start Autobet';
    betBtnEl.style.background = '';
  }

  function runNextAutoBet() {
    if (!autobetRunning) return;
    if (autobetCount >= autobetTarget) {
      stopAutobet();
      return;
    }
    autobetCount++;
    playRound();
  }

  function handleAutobetResult(multiplier) {
    const betVal = parseFloat(betInput.value) || 0;
    const payout = betVal * multiplier;
    const profit = payout - betVal;
    autobetProfit += profit;

    // Check stop conditions
    const stopProfitVal = parseFloat(document.getElementById('stopProfit').value) || 0;
    const stopLossVal = parseFloat(document.getElementById('stopLoss').value) || 0;

    if (stopProfitVal > 0 && autobetProfit >= stopProfitVal) {
      stopAutobet();
      return;
    }
    if (stopLossVal > 0 && autobetProfit <= -stopLossVal) {
      stopAutobet();
      return;
    }

    // Adjust bet based on win/loss
    const isWin = multiplier >= 1;
    if (isWin) {
      if (onWinAction === 'reset') {
        betInput.value = autobetOriginalBet.toFixed(2);
      } else if (onWinAction === 'increase') {
        const pct = parseFloat(document.getElementById('onWinPctInput').value) || 0;
        const newBet = betVal * (1 + pct / 100);
        betInput.value = Math.min(newBet, balance).toFixed(2);
      }
    } else {
      if (onLossAction === 'reset') {
        betInput.value = autobetOriginalBet.toFixed(2);
      } else if (onLossAction === 'increase') {
        const pct = parseFloat(document.getElementById('onLossPctInput').value) || 0;
        const newBet = betVal * (1 + pct / 100);
        betInput.value = Math.min(newBet, balance).toFixed(2);
      }
    }

    // Continue autobet
    if (autobetRunning) {
      const delay = turboMode ? 200 : 500;
      setTimeout(runNextAutoBet, delay);
    }
  }

  // ── Risk Toggle ──
  document.querySelectorAll('.risk-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (isDrawing) return;
      document.querySelectorAll('.risk-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentRisk = btn.dataset.risk;
      updateDisplay();
    });
  });

  // ── Auto Pick / Clear ──
  document.getElementById('autoPickBtn').addEventListener('click', () => {
    const count = parseInt(document.getElementById('pickCountSelect').value);
    autoPick(count);
  });

  document.getElementById('clearAllBtn').addEventListener('click', clearAll);

  // ── Quick Amount Buttons ──
  let maxConfirmPending = false;
  const maxBtn = document.querySelector('.quick-btn[data-action="max"]');

  document.querySelectorAll('.quick-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const action = btn.dataset.action;
      let val = parseFloat(betInput.value) || 0;

      if (action === 'max') {
        if (!maxConfirmPending) {
          maxConfirmPending = true;
          maxBtn.textContent = 'Confirm';
          maxBtn.style.color = 'var(--green-primary)';
          maxBtn.style.padding = '18px 14px';
          setTimeout(() => {
            if (maxConfirmPending) {
              maxConfirmPending = false;
              maxBtn.textContent = 'Max';
              maxBtn.style.color = '';
              maxBtn.style.padding = '';
            }
          }, 3000);
          return;
        }
        maxConfirmPending = false;
        maxBtn.textContent = 'Max';
        maxBtn.style.color = '';
        maxBtn.style.padding = '';
        val = balance;
      } else {
        if (maxConfirmPending) {
          maxConfirmPending = false;
          maxBtn.textContent = 'Max';
          maxBtn.style.color = '';
          maxBtn.style.padding = '';
        }
        if (action === 'half') val = val / 2;
        if (action === 'double') val = val * 2;
      }

      betInput.value = Math.max(0, Math.min(val, balance)).toFixed(2);
      updateDisplay();
    });
  });

  // ── Bet Mode Toggle ──
  const autobetPanel = document.getElementById('autobetSettings');
  const manualPanel = document.getElementById('manualSettings');
  document.querySelectorAll('.bet-mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.bet-mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      isAutoMode = btn.dataset.mode === 'auto';
      autobetPanel.style.display = isAutoMode ? '' : 'none';
      manualPanel.style.display = isAutoMode ? 'none' : '';
      if (isAutoMode) {
        btnContent.textContent = 'Start Autobet';
      } else {
        if (autobetRunning) stopAutobet();
        btnContent.textContent = 'Bet Now';
      }
      betBtnEl.style.background = '';
    });
  });

  // ── Autobet Number Chips ──
  document.querySelectorAll('.autobet-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const v = chip.dataset.bets;
      document.getElementById('numBets').value = v === 'Infinity' ? '' : v;
      if (v === 'Infinity') document.getElementById('numBets').placeholder = '\u221E';
    });
  });

  // ── On Win/Loss Segmented Toggle ──
  document.querySelectorAll('.autobet-seg-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const seg = btn.closest('.autobet-seg');
      seg.querySelectorAll('.autobet-seg-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const target = btn.dataset.target;
      const pctEl = document.getElementById(target + 'Pct');
      pctEl.style.display = btn.dataset.action === 'increase' ? '' : 'none';
    });
  });

  // ── Turbo Toggle (autobet panel) ──
  const autobetTurboToggle = document.getElementById('turboToggle');
  autobetTurboToggle.addEventListener('click', function() {
    turboMode = !turboMode;
    this.classList.toggle('active', turboMode);
    // Sync with settings popup toggle
    if (turboSettingsToggle) turboSettingsToggle.classList.toggle('active', turboMode);
  });

  // ── Settings Popup ──
  let soundEnabled = false;
  const settingsPopup = document.getElementById('settingsPopup');
  const soundToggle = document.getElementById('soundToggle');
  const turboSettingsToggle = document.getElementById('turboSettingsToggle');
  const settingsBtnEl = document.getElementById('settingsBtn');

  settingsBtnEl.addEventListener('click', (e) => {
    e.stopPropagation();
    settingsPopup.classList.toggle('visible');
    settingsBtnEl.classList.toggle('active', settingsPopup.classList.contains('visible'));
  });

  document.addEventListener('click', (e) => {
    if (!settingsPopup.contains(e.target) && e.target !== settingsBtnEl) {
      settingsPopup.classList.remove('visible');
      settingsBtnEl.classList.remove('active');
    }
  });

  soundToggle.addEventListener('click', () => {
    soundEnabled = !soundEnabled;
    soundToggle.classList.toggle('active', soundEnabled);
  });

  turboSettingsToggle.addEventListener('click', () => {
    turboMode = !turboMode;
    turboSettingsToggle.classList.toggle('active', turboMode);
    // Sync with autobet turbo toggle
    autobetTurboToggle.classList.toggle('active', turboMode);
  });

  // ── Init ──
  generateBoard();
  updateDisplay();
</script>

</body>
</html>
